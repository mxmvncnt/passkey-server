<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>
</head>
<body>
<input id="email" placeholder="email" /><br/>
<button onclick="register()">Register</button>
<br><br>
<button onclick="login()">Login</button>

<script>
    const { startRegistration, startAuthentication } = SimpleWebAuthnBrowser;
    const BASE = 'http://localhost:8080';
    const HEADERS = { 'Content-Type': 'application/json' }

    async function register() {
        const email = document.getElementById('email').value;

        const opts = await fetch(`${BASE}/passkey/register/begin`, {
            method: 'POST',
            headers: HEADERS,
            body: JSON.stringify({ email })
        }).then(r => r.json());
        console.log('register begin', opts);

        const cred = await startRegistration({ optionsJSON: opts});
        console.log('register credential', cred);

        const finishUrl = new URL(`${BASE}/passkey/register/finish`);
        finishUrl.searchParams.append('user_id', opts.user.id);

        const result = await fetch(finishUrl, {
            method: 'POST',
            headers: HEADERS,
            body: JSON.stringify(cred)
        });
        console.log('register finish', result);
        alert('c bon tu px te connecter mtn')
    }

    async function login() {
        const optionsJSON = await fetch(`${BASE}/passkey/login/begin`, {
            method: 'POST',
            headers: HEADERS
        }).then(r => r.json());
        console.log('login begin', optionsJSON);

        let cred;
        try {
            cred = await startAuthentication({optionsJSON: optionsJSON.options.publicKey});
        } catch (error) {
            throw error;
        }
        console.log('login credential', cred);

        const finishUrl = new URL(`${BASE}/passkey/login/finish`);
        finishUrl.searchParams.append('session_id', optionsJSON.session_id);

        const result = await fetch(finishUrl, {
            method: 'POST',
            headers: HEADERS,
            body: JSON.stringify(cred)
        }).then(r => r.json());

        console.log('login finish', result);
        alert(`Connecté: ${result.Email}`);
    }
</script>
</body>
</html>
